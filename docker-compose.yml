version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:./dev.db
      - NEXTAUTH_SECRET=your-secret-key-change-in-production
      - NEXTAUTH_URL=http://localhost:3000
      - ENCRYPTION_KEY=your-encryption-key-32-chars!
    volumes:
      - ./prisma:/app/prisma
    restart: unless-stopped
